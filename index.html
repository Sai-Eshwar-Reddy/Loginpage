<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="heading">
            <h1>Finance Tracker</h1>
        </div>
        <div class="box">
            <div class="inner_box"><button>Sign up</button></div>
            <div class="inner_box"><button>Sign in</button></div>
        </div>
        <div class="email">
            <h2>Email</h2>
            <input type="email" name="user_email" id="user_email">
        </div>
        <div class="password">
            <h2>Password</h2>
            <input type="password" name="user_password" id="user_password">
        </div>
        <div class="btn"><button>Login in</button></div>
        <p>Don't Have Account?<a href="#">Sign up</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
